instances:
  selmaprotbas:
    model: selmaprotbas/selmaprotbas
    parameters:
      env_type: fresh                    # (Define environment type, either fresh or marine), default = marine
      wdz: -3.0000000000000000 # vertical velocity of detritus (positive: upwards/floating, negative: downwards/sinking) (m/d), default = -4.5
      wpo4: -1.0 # vertical velocity of suspended P-Fe (positive: upwards/floating, negative: downwards/sinking) (m/d), default = -1.0
      dn: 0.50000000000000003E-1 # detritus mineralization rate (1/d), default = 0.003
      dn_sed: 0.10000000000000000E-2 # sediment mineralization rate (1/d), default = 0.002
      kc_det: 0.0036 # specific light attenuation of detritus (m2/mmol C), default = 0.0036
      q10_rec: 0.71118500000000001E-1 # temperature dependence of detritus remineralization (1/K), default = 0.15
      ade_r0: 0.2 # maximum chemolithoautotrophic denitrification rate (1/d), default = 0.1
      alphaade: 1 # half-saturation constant for chemolithoautotrophic denitrification (mmol N/m3), default = 1.0
      mbnnrate: 0.14458399999999999 # mineralization by nitrate rate relative to mineralization by oxygen (-), default = 0.1
      df_dean: 1.0              # relative contribution of denitrification out of total denitrification + anammox (-), default = 1.0
      df_dean_sed: 1.0          # relative contribution of denitrification out of total denitrification + anammox in sediment (-), default = 1.0
      nitrif_rate: 0.40261999999999999E-1 # nitrification rate (1/d), default = 0.1
      q10_recs: 0.50000000000000000 # temperature dependence of sediment remineralization (1/K), default = 0.175
      tau_crit: 0.07                     # critical shear stress (N/m2), default = 0.07
      sedrate_det: 3.3371124999999999 # detritus sedimentation rate (m/d), default = 2.25
      erorate: 6.0                       # sediment erosion rate (1/d), default = 6.0
      sedratepo4: 0.5                    # P-Fe sedimentation rate (m/d), default = 0.5
      eroratepo4: 6.0                    # P-Fe erosion rate (1/d), default = 6.0
      po4ret: 0.18 # fraction of mineralized phosphate that is converted to iron-phosphate-complexes in oxic sediments (-), default = 0.18
      pburialrate: 0.48786350000000001 # phosphate burial rate (1/d), default = 0.007
      fl_burialrt: 0.19285999999999999E-2 # sediment burial rate (1/d), default = 0.001
      plibrate: 0.1               # phosphate liberation rate, anoxic sediments (1/d), default = 0.1
      ipo4th: 100.0                      # maximum phosphorus density available for burial (mmol P/m2), default = 100.0
      br0: 0.03                          # bioresuspension rate (1/d), default = 0.03
      fds: 0.99929730000000005 # fraction of sediment remineralization fueled by denitrification (-), default = 0.7
      pvel: 5.0                          # piston velocity, only used if newflux=2 or 4 (m/d), default = 5.0
      newflux: 3                         # oxygen flux type (1=wind-based and Weiss saturation; 2=pvel parameter; 3=Cole and Caraco, Weiss, and Wanninkhof; 4=seawater temperature only), default = 2
      diagnostics: false                 # toggle diagnostic output, default = false
    initialization:
      nn: 175                            # nitrate (mmol N/m3)
      aa: 1.5                              # ammonium (mmol N/m3)
      dd_c: 50                          # carbon detritus (mmol C/m3)
      dd_p: 0.4                          # phosphorus detritus (mmol P/m3)
      dd_n: 5                          # nitrogen detritus (mmol N/m3)
      dd_si: 5                        # silica detritus (mmol Si/m3)
      o2: 312.0                          # oxygen (mmol O2/m3)
      po: 0.6                            # phosphate (mmol P/m3)
      si: 50                          # silica (mmol Si/m3)
      fl_c: 2500                       # carbon fluff (mmol C/m2)
      fl_p: 25                       # phosphorus fluff (mmol P/m2)
      fl_n: 500                           # nitrogen fluff (mmol N/m2)
      fl_si: 200                     # silica fluff (mmol Si/m2)
      pb: 0.4                           # phosphate bound to iron in sediment (mmol C/m2)
      pw: 0.03                          # phosphate bound to iron in water (mmol C/m3)
  diatoms:
    model: selmaprotbas/phytoplankton
    parameters:
      c0: 4                      # background concentration (mmol C/m3), default = 0.0
      rfr: 0.70000000000000001E-2 # phosphorus : carbon ratio (mol P/mol C), default = 1/106 = 0.009434
      rfn: 0.20000000000000001 # nitrogen : carbon ratio (mol N/mol C), default = 16/106 = 0.150943
      rfs: 0.141509                      # silica : carbon ratio (mol Si/mol C), default = 0.000
      alpha_n: 0.25000000000000000 # half-saturation concentration for nitrogen uptake (mmol N/m3), default = 0.25
      alpha_p: 0.10000000000000000E-1 # half-saturation concentration for phosphorus uptake (mmol P/m3), default = 0.015625
      alpha_si: 0.234375                 # half-saturation concentration for silica uptake (mmol Si/m3), default = 0.0
      r0: 1.5                            # maximum growth rate; tlim=1 - at 0 degC and 2*r0 at temp>>sqrt(tll); tlim=2 - at temp>>tll; tlim=3 or 4 - at 20 degC; tlim=5 - at temp_opt, default = 1.3
      tlim: 4                            # temperature limitation of growth (0: none, 1: flagellate-style, 2: cyanobacteria-style, 3:PROTECH-style, 4:optimal-stdev, 5: Lehman-equation, default = 0
      temp_opt: 20.0                     # optimum temperature of growth rate (degrees C), default = 20.0
      temp_sigma: 10.0                   # growth rate temperature constant; sigma in Gaussian curve (degrees C), default = 11.6
      llim: 1                            # light limitation of growth (1: Reynolds, 2: Selma, 3: Reynolds-smoothed), default = 1
      alpha_light: 0.1                   # the slope of light-dependent growth (d-1 [W/m2]-1), default = 0.1
      nb: 0.01                           # excretion rate (1/d), default = 0.01
      deltao: 0.02                       # mortality rate (1/d), default = 0.02
      Yc: 6.25                           # carbon : chlorophyll a ratio (mmol C/mg Chl a), default = 6.25
      wz: 0                          # vertical velocity (positive: upwards/floating, negative: downwards/sinking) (m/d), default = 0.0
      kc: 0.50000000000000001E-2 # specific light attenuation (m2/mmol C), default = 0.0084
      sedrate: 0.0                       # sedimentation rate (m/d), default = 0.0. If > 0, you need to couple to fluff variables under "coupling"
      use_24h_light: false               # use 24h averaged light for growth, default = false
      couple_dom: false                   # couple phytoplankton to dom module, default = false
      f_diss: 0.2                        # fraction of phytoplankton biomass that is dissolved, only used if couple_dom=true (-), default = 0.2
      diagnostics: false                 # toggle diagnostic output, default = false
    coupling:
      aa: selmaprotbas/aa                # ammonium (mmol N/m3)
      nn: selmaprotbas/nn                # nitrate (mmol N/m3)
      o2: selmaprotbas/o2                # oxygen (mmol O2/m3)
      po: selmaprotbas/po                # phosphate (mmol P/m3)
      si: selmaprotbas/si                # silica (mmol Si/m3)
      dd_c: selmaprotbas/dd_c            # carbon detritus (mmol C/m3)
      dd_p: selmaprotbas/dd_p            # phosphorus detritus (mmol P/m3)
      dd_n: selmaprotbas/dd_n            # nitrogen detritus (mmol N/m3)
      dd_si: selmaprotbas/dd_si          # silica detritus (mmol Si/m3)
      #dom_a: dom/dom_a                   # labile DOM (mg/m3)
    initialization:
      c: 0.006625                        # concentration (mmol C/m3)
  flagellates:
    model: selmaprotbas/phytoplankton
    parameters:
      c0: 4                       # background concentration (mmol C/m3), default = 0.0
      rfr: 0.70000000000000001E-2 # phosphorus : carbon ratio (mol P/mol C), default = 1/106 = 0.009434
      rfn: 0.20000000000000001 # nitrogen : carbon ratio (mol N/mol C), default = 16/106 = 0.150943
      rfs: 0                             # silica : carbon ratio (mol Si/mol C), default = 0.000
      alpha_n: 0.25000000000000000 # half-saturation concentration for nitrogen uptake (mmol N/m3), default = 0.25
      alpha_p: 0.10000000000000000E-1 # half-saturation concentration for phosphorus uptake (mmol P/m3), default = 0.015625
      r0: 0.5                            # maximum growth rate; tlim=1 - at 0 degC and 2*r0 at temp>>sqrt(tll); tlim=2 - at temp>>tll; tlim=3 or 4 - at 20 degC; tlim=5 - at temp_opt, default = 1.3
      tlim: 1                            # temperature limitation of growth (0: none, 1: flagellate-style, 2: cyanobacteria-style, 3:PROTECH-style, 4:optimal-stdev, 5: Lehman-equation), default = 0
      tll: 100.0                         # tlim=1; half-saturation temperature, squared, default = 100 (degrees C^2); tlim=2; lower temperature limit, default = 13.5 (degrees C)
      llim: 1                            # light limitation of growth (1: Reynolds, 2: Selma, 3: Reynolds-smoothed), default = 1
      alpha_light: 0.1                   # the slope of light-dependent growth (d-1 [W/m2]-1), default = 0.1)
      nb: 0.01                           # excretion rate (1/d), default = 0.01
      deltao: 0.02                       # mortality rate (1/d), default = 0.02
      wz: 0.0                            # vertical velocity (positive: upwards/floating, negative: downwards/sinking) (m/d), default = 0.0
      Yc: 6.25                           # carbon : chlorophyll a ratio (mmol C/mg Chl a), default = 6.25
      kc: 0.50000000000000001E-2 # specific light attenuation (m2/mmol C), default = 0.0084
      sedrate: 0.0                       # sedimentation rate (m/d), default = 0.0. If > 0, you need to couple to fluff variables under "coupling"
      use_24h_light: false               # use 24h averaged light for growth, default = false
      couple_dom: false                  # couple phytoplankton to dom module, default = false
      f_diss: 0.2                        # fraction of phytoplankton biomass that is dissolved, only used if couple_dom=true (-), default = 0.2
      diagnostics: false                 # toggle diagnostic output, default = false
    coupling:
      aa: selmaprotbas/aa                # ammonium (mmol N/m3)
      nn: selmaprotbas/nn                # nitrate (mmol N/m3)
      o2: selmaprotbas/o2                # oxygen (mmol O2/m3)
      po: selmaprotbas/po                # phosphate (mmol P/m3)
      si: selmaprotbas/si                # silica (mmol Si/m3)
      dd_c: selmaprotbas/dd_c            # carbon detritus (mmol C/m3)
      dd_p: selmaprotbas/dd_p            # phosphorus detritus (mmol P/m3)
      dd_n: selmaprotbas/dd_n            # nitrogen detritus (mmol N/m3)
      dd_si: selmaprotbas/dd_si          # silica detritus (mmol Si/m3)
      #dom_a: dom/dom_a                   # labile DOM (mg/m3)
    initialization:
      c: 0.006625                        # concentration (mmol C/m3)
  cyanobacteria:
    model: selmaprotbas/phytoplankton
    parameters:
      c0: 4                       # background concentration (mmol C/m3), default = 0.0
      rfr: 0.70000000000000001E-2 # phosphorus : carbon ratio (mol P/mol C), default = 1/106 = 0.009434
      rfn: 0.20000000000000001 # nitrogen : carbon ratio (mol N/mol C), default = 16/106 = 0.150943
      rfs: 0                             # silica : carbon ratio (mol Si/mol C), default = 0.000
      alpha_n: 0.25000000000000000 # half-saturation concentration for nitrogen uptake (mmol N/m3), default = 0.25
      alpha_p: 0.10000000000000000E-1 # half-saturation concentration for phosphorus uptake (mmol P/m3), default = 0.015625
      r0: 0.8                            # maximum growth rate; tlim=1 - at 0 degC and 2*r0 at temp>>sqrt(tll); tlim=2 - at temp>>tll; tlim=3 or 4 - at 20 degC; tlim=5 - at temp_opt, default = 1.3
      tlim: 2                            # temperature limitation of growth (0: none, 1: flagellate-style, 2: cyanobacteria-style, 3:PROTECH-style, 4:optimal-stdev, 5: Lehman-equation), default = 0
      tll: 13.5                          # tlim=1; half-saturation temperature, squared, default = 100 (degrees C^2); tlim=2; lower temperature limit, default = 13.5 (degrees C)
      llim: 3                            # light limitation of growth (1: Reynolds, 2: Selma, 3: Reynolds-smoothed), default = 1
      alpha_light: 0.1                   # the slope of light-dependent growth (d-1 [W/m2]-1), default = 0.1)
      nb: 0.01                           # excretion rate (1/d), default = 0.01
      deltao: 0.02                       # mortality rate (1/d), default = 0.02
      Yc: 6.25                           # carbon : chlorophyll a ratio (mmol C/mg Chl a), default = 6.25
      wz: 0.0                            # vertical velocity (positive: upwards/floating, negative: downwards/sinking) (m/d), default = 0.0
      nitrogen_fixation: true            # whether nitrogen fixation is used to acquire nitrogen, default = false
      buoyancy_regulation: true          # whether cells can regulate vertical movement, default = false
      par_limit1: 21.9                   # below this light intensity, buoyancy-regulating plankton change vertical velocity from vert_vel1 to vert_vel2 (W/m2)
      par_limit2: 6.6                    # below this light intensity, buoyancy-regulating plankton change vertical velocity to vert_vel3 (W/m2)
      par_limit3: 2.2                    # below this light intensity, buoyancy-regulating plankton change vertical velocity to vert_vel4 (W/m2)
      vert_vel1: -0.3                    # rate of vertical movement above par_limit1, if buoyancy_regulation = true (m/d)
      vert_vel2: -0.1                    # rate of vertical movement below par_limit1 and above par_limit2, if buoyancy_regulation = true (m/d)
      vert_vel3: 0                       # rate of vertical movement below par_limit2 and above par_limit3, if buoyancy_regulation = true (m/d)
      vert_vel4: 0.1                     # rate of vertical movement below par_limit3, if buoyancy_regulation = true (m/d)
      kc: 0.50000000000000001E-2 # specific light attenuation (m2/mmol C), default = 0.0084
      sedrate: 0.0                       # sedimentation rate (m/d), default = 0.0. If > 0, you need to couple to fluff variables under "coupling"
      use_24h_light: false               # use 24h averaged light for growth, default = false
      couple_dom: false                   # couple phytoplankton to dom module, default = false
      f_diss: 0.2                        # fraction of phytoplankton biomass that is dissolved, only used if couple_dom=true (-), default = 0.2
      diagnostics: false                 # toggle diagnostic output, default = false
    coupling:
      aa: selmaprotbas/aa                # ammonium (mmol N/m3)
      nn: selmaprotbas/nn                # nitrate (mmol N/m3)
      o2: selmaprotbas/o2                # oxygen (mmol O2/m3)
      po: selmaprotbas/po                # phosphate (mmol P/m3)
      si: selmaprotbas/si                # silica (mmol Si/m3)
      dd_c: selmaprotbas/dd_c            # carbon detritus (mmol C/m3)
      dd_p: selmaprotbas/dd_p            # phosphorus detritus (mmol P/m3)
      dd_n: selmaprotbas/dd_n            # nitrogen detritus (mmol N/m3)
      dd_si: selmaprotbas/dd_si          # silica detritus (mmol Si/m3)
      #dom_a: dom/dom_a                   # labile DOM (mg/m3)
    initialization:
      c: 0.006625                        # concentration (mmol C/m3)
  zooplankton:
    model: selmaprotbas/zooplankton
    parameters:
      c0: 1                       # background concentration (mmol C/m3), default = 0.0
      rfr: 0.70000000000000001E-2 # phosphorus : carbon ratio (mol P/mol C), default = 1/106 = 0.009434
      rfn: 0.20000000000000001 # nitrogen : carbon ratio (mol N/mol C), default = 16/106 = 0.150943
      rfs: 0                             # silica : carbon ratio (mol Si/mol C), default = 0
      nprey: 3                           # number of prey, default = 1
      pref3: 0.5                         # preference for prey 3 (-), default = 1.0
      nue: 0.001509                      # respiration rate (m3/d/mmol C), default = 0.001509
      sigma_b: 0.004528                  # mortality rate (m3/d/mmol C), default = 0.004528
      iv: 0.27341                        # Ivlev constant, quadratic (1/(mmol C/m3)2), default = 0.27341
      graz: 0.5                          # grazing rate (1/d), default = 0.5
      toptz: 20.0                        # optimal temperature for grazing (deg C), default = 20.0
      zcl1: 50.0                         # closure parameter (-), default = 50.0
      couple_dom: false                   # couple phytoplankton to dom module, default = false
      f_diss: 0.2                        # fraction of zooplankton biomass that is dissolved, only used if DOM is coupled (-), default = 0.2
    coupling:
      prey1: diatoms                     # prey 1
      prey2: flagellates                 # prey 2
      prey3: cyanobacteria               # prey 3
      aa: selmaprotbas/aa                # ammonium (mmol N/m3)
      po: selmaprotbas/po                # phosphate (mmol P/m3)
      si: selmaprotbas/si                # silica (mmol Si/m3)
      dd_c: selmaprotbas/dd_c            # carbon detritus (mmol C/m3)
      dd_p: selmaprotbas/dd_p            # phosphorus detritus (mmol P/m3)
      dd_n: selmaprotbas/dd_n            # nitrogen detritus (mmol N/m3)
      dd_si: selmaprotbas/dd_si          # silica detritus (mmol Si/m3)
      o2: selmaprotbas/o2                # oxygen (mmol O2/m3)
      #dom_a: dom/dom_a                   # labile DOM (mg/m3)
    initialization:
      c: 0.006625                        # concentration (mmol C/m3)
  dom:
    model: selmaprotbas/dom
    parameters:
      km_o2: 0.0123                      # respiration (mmol/m3), default = 0.0123
      km_no3: 0.01                       # denitrification (mmol/m3), default = 0.01
      k_inh_o2: 0.33                     # inhibitation of denitrification by O2 (mmol/m3), default = 0.33
      k_om1: 1.0                         # labile OM degradation rate (1/yr), default = 1.0
      k_om2: 0.1                         # semi-labile OM2 degradation rate (1/yr), default = 0.1
      theta: 1.047                       # Temperature adjustment coefficient (-), default = 1.047
      oc_dom: 0.01                       # Optical cross section of DOM (m2/mgDOM), default = 0.01
      qy_dom: 0.1                        # Quantum yield (mgDOM / mol PAR), default = 0.1
      f_par: 0.45                        # PAR fraction (-), default = 0.45
      e_par: 240800                      # Energy of PAR photons (J/mol), 240800
      k_floc: 0.0006                     # flocculation rate (1/d), default = 0.0006
      mole_per_weight: 0.0416            # mole_per_weight (molC/gDOM), default = 0.0416
      n_use_factor: 0.8                  # Factor of bacterial mineralisation as N flux (mmol N / mg DOM), default = 0.8
      k_leach: 0.001                     # Leaching constant, at 20 degrees (1/d), default = 0.001
      q_leach: 0.02                      # temperature dependence of leaching (1/K), default = 0.02
      ext_coef_a: 0.1                    # Linear coefficient DOM light influence (m2/mgDOM), default = 0.1
      ext_coef_b: 1.22                   # Exponential coefficient DOM light influence (-), default = 1.22
      diagnostics: false                 # toggle diagnostic output, default = false
    coupling:
      o2: selmaprotbas/o2                # oxygen (mmol O2/m3)
      nn: selmaprotbas/nn                # nitrate (mmol N/m3)
      aa: selmaprotbas/aa                # ammonium (mmol N/m3)
      dd_c: selmaprotbas/dd_c            # carbon detritus (mmol C/m3)
    initialization:
      dom_a: 5.0                         # labile DOM (mg/m3)
      dom_b: 5.0                         # semi-labile DOM (mg/m3)
# Atmospheric input
  ammonium_input:
    model: constant_surface_flux
    parameters:
      flux: 0.0                          # flux (positive for into water) (UNITS m-2 s-1)
    coupling:
      target: selmaprotbas/aa            # target variable (UNITS m-3)
  nitrate_input:
    model: constant_surface_flux
    parameters:
      flux: 0.0                          # flux (positive for into water) (UNITS m-2 s-1)
    coupling:
      target: selmaprotbas/nn            # target variable (UNITS m-3)
  phosphate_input:
    model: constant_surface_flux
    parameters:
      flux: 0.0                          # flux (positive for into water) (UNITS m-2 s-1)
    coupling:
      target: selmaprotbas/po            # target variable (UNITS m-3)
